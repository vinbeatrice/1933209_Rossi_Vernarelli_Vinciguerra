<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sensor Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Mars Control Panel</div>
        <div class="nav-links">
            <a href="/index.html">Dashboard</a>
            <a href="/rules.html">Automation Rules</a>
            <a href="/actuators.html">Actuators</a>
            <a href="/charts.html">Charts</a>
        </div>
    </nav>

    <header class="page-header">
        <div>
            <h1>Live Sensor Dashboard</h1>
            <p>Latest measurement for each sensor</p>
        </div>

        <div class="polling-panel">
            <label for="pollingIntervalInput">REST polling interval (ms)</label>
            <div class="polling-panel-row">
                <input type="number" id="pollingIntervalInput" min="1000" step="1000">
                <button id="savePollingIntervalBtn" type="button">Update</button>
            </div>
        </div>
    </header>

    <section class="latest-rule-panel" id="latestRulePanel">
        <h2>Latest Applied Rule</h2>
        <div id="latestRuleContent" class="empty-message">No rule triggered yet.</div>
    </section>

    <main>
        <section id="sensorGrid" class="sensor-grid"></section>
    </main>

    <script src="/js/index.js"></script>
</body>
</html>
